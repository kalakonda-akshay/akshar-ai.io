<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Akshar.ai</title>
<link rel="stylesheet" href="../styles/global.css">
<script src="../js/web-fallback.js"></script>
<style>
body{overflow:hidden;display:flex;flex-direction:column;height:100vh;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.25;animation:flt 9s ease-in-out infinite;}
.o1{width:500px;height:500px;background:radial-gradient(circle,#7c6fff,transparent);top:-180px;left:-150px;}
.o2{width:360px;height:360px;background:radial-gradient(circle,#22d3ee,transparent);bottom:-100px;right:-90px;animation-delay:-4s;}
.o3{width:260px;height:260px;background:radial-gradient(circle,#34d399,transparent);top:35%;right:20%;animation-delay:-7s;opacity:.15;}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

.wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding-top:42px;}
.box{width:450px;background:rgba(10,10,22,.94);border:1px solid rgba(124,111,255,.35);border-radius:var(--r4);backdrop-filter:blur(40px);box-shadow:0 28px 80px rgba(0,0,0,.75),0 0 60px rgba(124,111,255,.1);animation:popIn .5s ease;overflow:hidden;}

/* TABS */
.tabs{display:flex;background:rgba(7,7,15,.6);border-bottom:1px solid var(--bdr);}
.tab{flex:1;padding:15px;text-align:center;font-family:var(--fd);font-size:13px;font-weight:600;cursor:pointer;color:var(--t3);transition:var(--trf);border-bottom:2px solid transparent;}
.tab.on{color:var(--p2);border-bottom-color:var(--p);}
.tab:hover:not(.on){color:var(--t2);}

.pane{padding:28px 30px 30px;}

/* LOGO */
.logo{text-align:center;margin-bottom:22px;}
.logo-icon{width:62px;height:62px;background:linear-gradient(135deg,#7c6fff,#22d3ee);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:29px;box-shadow:0 8px 32px rgba(124,111,255,.45);}
.logo-name{font-family:var(--fd);font-size:23px;font-weight:800;background:linear-gradient(135deg,#fff,#a99fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:10px;color:var(--t4);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px;}

/* FORM */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg2{margin-bottom:13px;}
.fg2 label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.ic-wrap{position:relative;}
.ic-wrap .inp{padding-left:38px;}
.ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;}

/* AVATARS */
.av-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.av{width:40px;height:40px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;background:var(--glass);border:2px solid var(--bdr);transition:var(--trf);}
.av:hover,.av.on{border-color:var(--p);background:var(--pg);}

/* MESSAGES */
.err{display:none;background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.3);color:#fca5a5;padding:9px 13px;border-radius:var(--r2);font-size:12px;margin-bottom:12px;}
.err.show{display:block;}
.suc{display:none;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--green);padding:9px 13px;border-radius:var(--r2);font-size:12px;margin-bottom:12px;}
.suc.show{display:block;}

.demo{margin-top:14px;text-align:center;font-size:11px;color:var(--t4);padding:10px;background:var(--glass);border-radius:var(--r2);border:1px dashed var(--bdr);}
.demo code{font-family:var(--fm);color:var(--p2);background:var(--pg);padding:2px 6px;border-radius:4px;}
</style>
</head>
<body>

  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
</div>

</div>

<script>
const ipcRenderer = window.ipcRenderer;
let PORT = 52700;
let selAv = '👨‍🎓';

const AVTS = ['👨‍🎓','👩‍🎓','🧑‍💻','👩‍💻','🧑‍🔬','👩‍🔬','🧑‍🏫','👩‍🏫','🎓','📖','🔬','💡','🚀','⚡','🌟','🏆','🧠','💎'];

async function init() {
  PORT = await ipcRenderer.invoke('get-port');
  buildAvatars();
}

function buildAvatars() {
  const row = document.getElementById('av-row');
  AVTS.forEach((av, i) => {
    const d = document.createElement('div');
    d.className = 'av' + (i === 0 ? ' on' : '');
    d.textContent = av;
    d.onclick = () => {
      document.querySelectorAll('.av').forEach(x => x.classList.remove('on'));
      d.classList.add('on'); selAv = av;
    };
    row.appendChild(d);
  });
}

function switchTab(tab) {
  document.getElementById('pane-login').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('pane-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('on',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('on', tab === 'register');
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVisible = document.getElementById('pane-login').style.display !== 'none';
  if (loginVisible) doLogin(); else doRegister();
});

async function callBackend(endpoint, body) {
  try {
    const baseUrl = window.ipcRenderer && window.ipcRenderer.isElectron
      ? `http://127.0.0.1:${PORT}`
      : window.location.origin;
    const r = await fetch(`${baseUrl}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch(e) {
    return { ok: false, error: 'App backend not ready. Please wait a moment and try again.' };
  }
}

async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  if (!u || !p) { showMsg('lerr', 'Enter username and password'); return; }

  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spin spin-sm"></span> Signing in...'; btn.disabled = true;

  await new Promise(r => setTimeout(r, 400));
  const data = await callBackend('login', { username: u, password: p });

  if (data.ok) {
    await ipcRenderer.invoke('db-set', { key: 'currentUser', val: data.user });
    window.location.href = 'dashboard.html';
  } else {
    showMsg('lerr', data.error || 'Login failed');
    btn.innerHTML = 'Sign In →'; btn.disabled = false;
  }
}

async function doRegister() {
  const name     = document.getElementById('rname').value.trim();
  const username = document.getElementById('ruser').value.trim();
  const password = document.getElementById('rpass').value;
  const semester = document.getElementById('rsemester').value;
  const branch   = document.getElementById('rbranch').value;
  const college  = document.getElementById('rcollege').value.trim();

  if (!name || !username || !password) { showMsg('rerr', 'Name, username and password are required'); return; }
  if (password.length < 4) { showMsg('rerr', 'Password must be at least 4 characters'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(username)) { showMsg('rerr', 'Username can only have letters, numbers and underscore'); return; }

  const btn = document.getElementById('reg-btn');
  btn.innerHTML = '<span class="spin spin-sm"></span> Creating...'; btn.disabled = true;

  const data = await callBackend('register', { username, password, name, role: 'B.Tech Student', year: semester, branch, college, avatar: selAv });

  if (data.ok) {
    document.getElementById('rerr').classList.remove('show');
    document.getElementById('rsuc').textContent = '✅ Account created! Redirecting to login...';
    document.getElementById('rsuc').classList.add('show');
    setTimeout(() => {
      switchTab('login');
      document.getElementById('lu').value = username;
      document.getElementById('rsuc').classList.remove('show');
    }, 1500);
  } else {
    showMsg('rerr', data.error || 'Registration failed');
  }
  btn.innerHTML = 'Create Account →'; btn.disabled = false;
}

function showMsg(id, msg) {
  const el = document.getElementById(id);
  el.textContent = '⚠️ ' + msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

init();
</script>

<style>
.trail-dot{position:fixed;pointer-events:none;border-radius:50%;transform:translate(-50%,-50%);animation:trail-fade 0.6s ease-out forwards;z-index:99999}
@keyframes trail-fade{0%{opacity:.9;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.1)}}
</style>
<script>
(function(){
  const C=['#a78bfa','#818cf8','#60a5fa','#34d399','#f472b6','#fb923c','#facc15'],S=[6,8,10,7,9];
  let lx=-100,ly=-100,f=0;
  document.addEventListener('mousemove',e=>{
    const dx=e.clientX-lx,dy=e.clientY-ly;
    if(dx*dx+dy*dy<16)return;
    lx=e.clientX;ly=e.clientY;f++;
    const d=document.createElement('div');
    d.className='trail-dot';
    const sz=S[f%S.length],col=C[f%C.length];
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;background:'+col+';left:'+e.clientX+'px;top:'+e.clientY+'px;box-shadow:0 0 '+(sz*2)+'px '+col;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),620);
  });
})();
</script>
